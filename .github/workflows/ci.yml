# CI: every push/PR to dev or main must pass the offline test suite, lint
# clean, and produce a working admin-panel build. No secrets, no API calls —
# the suite is designed to run keyless (<2s), so CI can never spend credits.
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  python:
    name: Tests + lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint (pyflakes)
        run: python -m pyflakes ai_video_maker
      - name: Tests
        run: python -m pytest tests/ -q

  admin-panel:
    name: Admin panel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin_ui/package-lock.json
      - name: Install
        working-directory: admin_ui
        run: npm ci
      - name: Build
        working-directory: admin_ui
        run: npm run build
